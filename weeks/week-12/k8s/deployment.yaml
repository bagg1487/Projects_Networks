apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-app
  labels:
    app: users-app
    group: "433"
    student: s14
spec:
  replicas: 3
  selector:
    matchLabels:
      app: users-app
  template:
    metadata:
      labels:
        app: users-app
        group: "433"
        student: s14
    spec:
      containers:
      - name: users-container
        image: users-app:latest
        ports:
        - containerPort: 8200
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8200
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8200
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 3
        env:
        - name: SERVICE_PORT
          value: "8200"
        - name: RESOURCE_TYPE
          value: "users"