syntax = "proto3";

package events.v1;

// Сервис для управления событиями
service EventsService {
  // Создать новое событие
  rpc CreateEvent (CreateEventRequest) returns (CreateEventResponse);
  
  // Получить событие по ID
  rpc GetEvent (GetEventRequest) returns (GetEventResponse);
  
  // Получить список всех событий
  rpc ListEvents (ListEventsRequest) returns (ListEventsResponse);
}

// Запрос на создание события
message CreateEventRequest {
  string name = 1;
  string description = 2;
  string location = 3;  // Дополнительное поле из варианта
  int64 timestamp = 4;
}

// Ответ на создание события
message CreateEventResponse {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string location = 4;
  int64 timestamp = 5;
  string status = 6;
}

// Запрос на получение события
message GetEventRequest {
  int32 id = 1;
}

// Ответ на получение события
message GetEventResponse {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string location = 4;
  int64 timestamp = 5;
}

// Запрос на список событий
message ListEventsRequest {
  int32 page = 1;
  int32 page_size = 2;
}

// Ответ со списком событий
message ListEventsResponse {
  repeated Event events = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Тип события
message Event {
  int32 id = 1;
  string name = 2;
  string description = 3;
  string location = 4;
  int64 timestamp = 5;
}